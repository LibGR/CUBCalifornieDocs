name: Deploy Starlight Docs

on:
  push:
    branches:
      - starlight-main
  workflow_dispatch: # permet de lancer manuellement le workflow

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro/Starlight site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        environment:
          name: github-pages