name: Deploy Starlight to GitHub Pages

on:
  # Déclenche le workflow à chaque push sur la branche source
  push:
    branches: [ starlight-main ]
  # Permet un lancement manuel depuis l'onglet Actions
  workflow_dispatch:

# Permissions nécessaires pour GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2. Installer et construire le site avec Astro
      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      # 3. Publier le site dans la branche finale `st-pages`
      - name: Deploy to st-pages branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch origin st-pages || git checkout -b st-pages
          git checkout -B st-pages
          git rm -rf .
          cp -r dist/* .
          git add .
          git commit -m "Deploy site from starlight-main [skip ci]"
          git push -f origin st-pages